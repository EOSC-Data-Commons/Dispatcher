name: Deploy

on:
  push:
    branches: [ master ]
    tags: [ "v*" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Determine deployment target
        id: vars
        run: |
          TAG=$(git tag --points-at HEAD --list 'v*' | head -1)
          if [ -n "$TAG" ]; then
            echo "target_hosts=player.eosc-data-commons.eu" >> $GITHUB_OUTPUT
            echo "healthcheck_urls=player.eosc-data-commons.eu" >> $GITHUB_OUTPUT
            echo "version=$TAG" >> $GITHUB_OUTPUT
          else
            HOSTS=dev1.player.eosc-data-commons.eu,dev2.player.eosc-data-commons.eu
            echo "target_hosts=$HOSTS" >> $GITHUB_OUTPUT
            echo "healthcheck_urls=https://${HOSTS//,/|https:\/\//}" >>$GITHUB_OUTPUT
            echo "version=master" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Ansible Vault
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ansible/vault_password.txt

      - name: Test SSH Connection
        run: |
          for h in $(echo ${{ steps.vars.outputs.target_hosts }} | tr , ' '); do
            ssh -o StrictHostKeyChecking=no ubuntu@$h || exit 1
          done

      - name: Run Ansible Playbook
        run: |
          cd ansible
          ansible-playbook dispatcher.yml \
            --limit "${{ steps.vars.outputs.target_hosts }}" \
            --vault-password-file vault_password.txt \
            --extra-vars "dispatcher_branch=${{ steps.vars.outputs.version }}"

      - name: Healthcheck
        uses: jtalk/url-health-check-action@v4
        with:
          url: ${{ steps.vars.outputs.healthcheck_urls }}
          follow-redirect: true
          max-attempts: 3
          retry-delay: 5s
